<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    :root { --primary: #4242ee; }
    @media (prefers-color-scheme: dark) {
      :root { --primary: #eeee42; }
    }
  </style>
  <polygon
    points="16,1 29,8.5 29,23.5 16,31 3,23.5 3,8.5"
    fill="none"
    stroke="var(--primary)"
    stroke-width="2"
  />
  <!-- J with T-cap: horizontal crossbar, vertical stem, bottom-left hook -->
  <path
    d="M 10,10 H 22 M 16,10 V 22 C 16,27 10,27 10,24"
